apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: cloudpredict
  labels:
    app: cloudpredict
    component: redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cloudpredict
      component: redis
  template:
    metadata:
      labels:
        app: cloudpredict
        component: redis
    spec:
      containers:
      - name: redis
        image: redis:7-alpine
        ports:
        - containerPort: 6379
          name: redis
        command:
        - redis-server
        - "--requirepass"
        - "$(REDIS_PASSWORD)"
        - "--maxmemory"
        - "128mb"
        - "--maxmemory-policy"
        - "allkeys-lru"
        env:
        - name: REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: cloudpredict-secret
              key: REDIS_PASSWORD
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 250m
            memory: 256Mi
        livenessProbe:
          exec:
            command:
            - redis-cli
            - "-a"
            - "$(REDIS_PASSWORD)"
            - "ping"
          initialDelaySeconds: 15
          periodSeconds: 10
          timeoutSeconds: 5
        readinessProbe:
          exec:
            command:
            - redis-cli
            - "-a"
            - "$(REDIS_PASSWORD)"
            - "ping"
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
