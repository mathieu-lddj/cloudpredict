apiVersion: v1
kind: Service
metadata:
  name: postgres-service
  namespace: cloudpredict
  labels:
    app: cloudpredict
    component: postgres
spec:
  type: ClusterIP
  selector:
    app: cloudpredict
    component: postgres
  ports:
  - port: 5432
    targetPort: 5432
    protocol: TCP
    name: postgres
